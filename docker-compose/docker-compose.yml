services:
  rabbitmq-service:
    image: rabbitmq:3.13.0-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
      RABBITMQ_DEFAULT_VHOST: ordermesh-retry
    volumes:
      - ./rabbitmq-data:/var/lib/rabbitmq
    networks:
      - ordermesh-retry-network

  postgres-service:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ordermesh-retry
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
      - ./conf:/etc/postgresql/conf.d
    networks:
      - ordermesh-retry-network

  redis:
    image: redis:7.2
    ports:
      - "6379:6379"
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - ./redis-data:/data
    networks:
      - ordermesh-retry-network

networks:
  ordermesh-retry-network:
    driver: bridge